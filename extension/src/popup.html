<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WebRelay</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>WebRelay</h1>
        <p id="current-url"></p>
      </header>

      <label>
        Intent
        <textarea id="intent" rows="3" placeholder="Extract article title, author, date, and body"></textarea>
      </label>

      <section class="controls">
        <button id="generate">Capture Preview</button>
        <button id="save" disabled>Save Configuration</button>
        <button id="repair" disabled>Repair</button>
      </section>

      <label>
        Refine or export
        <textarea
          id="refinement"
          rows="3"
          placeholder="Convert to markdown, rename fields, remove noise, or output a custom JSON shape"
        ></textarea>
      </label>

      <section class="controls secondary-controls">
        <button id="refine" disabled>Refine</button>
        <button id="export" disabled>Export Format</button>
      </section>

      <label>
        Saved Configurations
        <select id="profiles"></select>
      </label>

      <label>
        Default action
        <select id="action-preset">
          <option value="copy">Copy</option>
          <option value="download">Download</option>
          <option value="copy_download">Copy and download</option>
        </select>
      </label>
      <button id="run-profile">Run Configuration</button>

      <section class="status">
        <strong>Status</strong>
        <p id="status">Ready</p>
      </section>

      <section>
        <div class="section-heading">
          <strong>Output</strong>
          <button id="copy-output" class="small-button" disabled>Copy Output</button>
        </div>
        <pre id="export-result"></pre>
      </section>

      <details>
        <summary>Debug</summary>
        <div class="section-heading">
          <strong>Structured extraction</strong>
          <button id="copy-preview" class="small-button" disabled>Copy JSON</button>
        </div>
        <pre id="result"></pre>
        <pre id="debug"></pre>
      </details>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
