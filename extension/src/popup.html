<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WebRelay</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>WebRelay</h1>
          <p id="current-url"></p>
        </div>
        <button id="btn-new" class="btn-primary">New</button>
      </header>

      <nav class="tabs">
        <button id="tab-quickrun" class="tab-btn active">Quick Run</button>
        <button id="tab-studio" class="tab-btn">Codex Studio</button>
      </nav>

      <section id="panel-quickrun" class="tab-panel">
        <section id="screen-list" class="screen">
          <div class="scope-toggle" role="group" aria-label="Profile list scope">
            <button id="scope-current" class="scope-btn active">Current URL</button>
            <button id="scope-all" class="scope-btn">All Profiles</button>
          </div>
          <div id="profile-list" class="profile-list"></div>
        </section>
      </section>

      <section id="panel-studio" class="tab-panel hidden">
        <div id="studio-entry" class="screen">
          <label>
            User instructions
            <textarea id="studio-instructions" rows="4" placeholder="Leave blank for auto mode, or describe what to extract or change."></textarea>
          </label>
          <label>
            Base profile
            <select id="studio-base-profile">
              <option value="">None - create a new profile</option>
            </select>
          </label>
          <button id="btn-generate" class="btn-primary">Generate</button>
        </div>

        <div id="studio-generating" class="screen hidden">
          <p id="studio-stage" class="stage">Preparing...</p>
          <div id="studio-log" class="process-log"></div>
          <div id="studio-artifacts" class="process-artifacts"></div>
          <div class="row">
            <button id="btn-cancel-studio" class="btn-ghost btn-danger">Cancel</button>
            <button id="btn-clear-studio" class="btn-ghost hidden">Clear</button>
          </div>
        </div>
      </section>

      <section id="screen-edit" class="screen hidden">
        <div class="editor-header">
          <h2 id="editor-title">New Profile</h2>
          <button id="btn-back" class="btn-ghost">Back</button>
        </div>

        <label>
          Name
          <input id="profile-name" type="text" placeholder="Chat to Markdown" />
        </label>

        <label>
          URL pattern
          <input id="profile-url-pattern" type="text" />
        </label>

        <label>
          Action
          <select id="profile-action">
            <option value="copy">Copy</option>
            <option value="download">Download</option>
            <option value="copy_download">Copy + Download</option>
          </select>
        </label>

        <label>
          Recipe JSON
          <textarea id="profile-recipe" class="code-area" spellcheck="false"></textarea>
        </label>

        <label>
          JS transform body
          <textarea id="profile-script" class="code-area" spellcheck="false"></textarea>
        </label>

        <div class="row">
          <button id="btn-preview" class="btn-secondary">Run Preview</button>
          <button id="btn-save" class="btn-primary">Save</button>
        </div>

        <details id="preview-panel" class="preview-panel">
          <summary>Preview</summary>
          <div class="preview-grid">
            <label>
              Script input
              <pre id="preview-input"></pre>
            </label>
            <label>
              Output
              <pre id="preview-output"></pre>
            </label>
          </div>
        </details>
      </section>

      <p id="status-bar" class="status-bar"></p>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
